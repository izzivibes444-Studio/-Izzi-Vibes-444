<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Izzi Vibes 444</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Izzi Vibes 444" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- OneSignal SDK -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "72aca7a6-90ac-4c87-9c8c-d11f64ba3acf",
        safari_web_id: "",
        notifyButton: {
          enable: true,
          size: "medium",
          theme: "default",
          position: "bottom-left",
          offset: { bottom: "20px", left: "20px" },
          showCredit: false,
          text: {
            "tip.state.unsubscribed": "Ativar notificações",
            "tip.state.subscribed": "Notificações ativadas!",
            "tip.state.blocked": "Notificações bloqueadas",
            "message.prenotify": "Clique para ativar notificações",
            "message.action.subscribed": "Obrigada por se inscrever!",
            "message.action.resubscribed": "Você está inscrita para notificações",
            "message.action.unsubscribed": "Você não receberá mais notificações",
            "dialog.main.title": "Gerenciar notificações do site",
            "dialog.main.button.subscribe": "ATIVAR",
            "dialog.main.button.unsubscribe": "DESATIVAR",
            "dialog.blocked.title": "Desbloquear notificações",
            "dialog.blocked.message": "Siga as instruções para ativar notificações:"
          }
        },
        welcomeNotification: {
          title: "Izzi Vibes 444 ✦",
          message: "Obrigada por ativar as notificações! 💜",
          disable: false
        },
        promptOptions: {
          slidedown: {
            prompts: [
              {
                type: "push",
                autoPrompt: true,
                text: {
                  actionMessage: "Izzi Vibes quer te enviar atualizações especiais 💜",
                  acceptButton: "Sim, quero!",
                  cancelButton: "Agora não"
                },
                delay: { pageViews: 1, timeDelay: 3 }
              }
            ]
          }
        }
      });
    });
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --violet: #7c3aed;
      --violet-light: #a78bfa;
      --violet-dark: #4c1d95;
      --rose: #f472b6;
      --gold: #fbbf24;
      --bg: #0d0a1a;
      --surface: #1a1330;
      --text: #f3f0ff;
      --muted: #9ca3af;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Estrelas de fundo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(167,139,250,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 10%, rgba(244,114,182,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 60%, rgba(251,191,36,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 10% 80%, rgba(167,139,250,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 70%, rgba(244,114,182,0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 35% 15%, rgba(251,191,36,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 85%, rgba(167,139,250,0.5) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      pointer-events: none;
    }
    .orb-1 { width: 400px; height: 400px; background: var(--violet); top: -10%; left: -10%; animation: float 8s ease-in-out infinite; }
    .orb-2 { width: 300px; height: 300px; background: var(--rose); bottom: -5%; right: -5%; animation: float 10s ease-in-out infinite reverse; }
    .orb-3 { width: 200px; height: 200px; background: var(--gold); top: 50%; left: 50%; transform: translate(-50%,-50%); animation: pulse 6s ease-in-out infinite; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(5deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: translate(-50%,-50%) scale(1); }
      50% { opacity: 0.4; transform: translate(-50%,-50%) scale(1.2); }
    }

    .logo-num {
      font-family: 'Playfair Display', serif;
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--violet-light), var(--rose), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      letter-spacing: -0.02em;
      animation: shimmer 4s ease-in-out infinite;
      background-size: 200% 200%;
    }
    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-style: italic;
      color: var(--violet-light);
      letter-spacing: 0.1em;
      margin-top: -0.5rem;
      opacity: 0.9;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--rose), transparent);
      margin: 1.5rem auto;
    }

    .tagline {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.05em;
      max-width: 320px;
      line-height: 1.6;
    }

    .notify-btn {
      margin-top: 2.5rem;
      padding: 0.9rem 2.2rem;
      background: linear-gradient(135deg, var(--violet), var(--violet-dark));
      color: white;
      border: none;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }
    .notify-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--violet-light), var(--rose));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .notify-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,0.5); }
    .notify-btn:hover::before { opacity: 1; }
    .notify-btn span { position: relative; z-index: 1; }

    .status-badge {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .footer {
      position: fixed;
      bottom: 1.2rem;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.7rem;
      color: rgba(156,163,175,0.4);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      z-index: 1;
    }

    /* PWA install banner */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      background: var(--surface);
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      max-width: 260px;
      z-index: 999;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: slideUp 0.4s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #install-banner p { font-size: 0.85rem; color: var(--text); margin-bottom: 0.8rem; line-height: 1.4; }
    #install-banner .btn-row { display: flex; gap: 0.5rem; }
    #install-banner button {
      flex: 1; padding: 0.5rem; border-radius: 8px; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 0.8rem; cursor: pointer;
    }
    #install-banner #btn-install { background: var(--violet); color: white; }
    #install-banner #btn-dismiss { background: transparent; color: var(--muted); border: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body>

<div class="hero">
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>
  <div class="glow-orb orb-3"></div>

  <div class="logo-num">444</div>
  <div class="logo-text">Izzi Vibes</div>
  <div class="divider"></div>
  <p class="tagline">Vibrações que chegam na hora certa ✦ para quem sente o universo</p>

  <button class="notify-btn" id="btnNotify" onclick="ativarNotificacoes()">
    <span>💜 Ativar Notificações</span>
  </button>

  <div class="status-badge" id="statusBadge" style="display:none">
    <div class="status-dot"></div>
    <span>Notificações ativas!</span>
  </div>
</div>

<div class="footer">Izzi Vibes 444 · feito com amor ✦</div>

<!-- PWA Install Banner -->
<div id="install-banner">
  <p>💜 Adicione o <strong>Izzi Vibes 444</strong> na sua tela inicial!</p>
  <div class="btn-row">
    <button id="btn-install">Instalar</button>
    <button id="btn-dismiss">Agora não</button>
  </div>
</div>

<script>
  // Registrar Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('SW registrado:', reg.scope))
        .catch(err => console.log('SW erro:', err));
    });
  }

  // Botão de notificações OneSignal
  async function ativarNotificacoes() {
    if (window.OneSignal) {
      try {
        const permission = await OneSignal.Notifications.requestPermission();
        if (permission) {
          document.getElementById('btnNotify').style.display = 'none';
          document.getElementById('statusBadge').style.display = 'flex';
        }
      } catch(e) {
        console.log('Permissão negada ou erro:', e);
      }
    }
  }

  // Verificar se já está inscrita
  OneSignalDeferred.push(async function(OneSignal) {
    const isSubscribed = await OneSignal.User.PushSubscription.optedIn;
    if (isSubscribed) {
      document.getElementById('btnNotify').style.display = 'none';
      document.getElementById('statusBadge').style.display = 'flex';
    }
  });

  // PWA Install Prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-banner').style.display = 'block';
  });

  document.getElementById('btn-install').addEventListener('click', async () => {
    document.getElementById('install-banner').style.display = 'none';
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
    }
  });

  document.getElementById('btn-dismiss').addEventListener('click', () => {
    document.getElementById('install-banner').style.display = 'none';
  });
</script>

</body>
</html>
